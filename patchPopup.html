<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch Popup</title>
    <style>
      :root {
        --bg: #f7faf8;
        --ink: #18211e;
        --muted: #5f7068;
        --line: #d5dfd9;
        --ok: #1d7a4c;
        --err: #b7372e;
        --run: #17619a;
      }
      body {
        margin: 0;
        padding: 0.7rem;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .panel {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 10px;
        padding: 0.75rem;
      }
      .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .muted { color: var(--muted); font-size: 0.9rem; }
      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.15rem 0.5rem;
        font-size: 0.78rem;
        font-weight: 700;
      }
      .run { color: var(--run); }
      .ok { color: var(--ok); }
      .err { color: var(--err); }
      .progress {
        margin-top: 0.4rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        height: 10px;
      }
      .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #1b699f, #4cb0de); }
      .errors {
        margin-top: 0.6rem;
        border: 1px solid #e6c4c1;
        background: #fff3f3;
        border-radius: 8px;
        padding: 0.55rem;
      }
      button {
        border: 1px solid #8f2f2a;
        color: #8f2f2a;
        background: #fff;
        border-radius: 8px;
        padding: 0.45rem 0.75rem;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h3 style="margin:0 0 0.4rem;">Live Session</h3>
      <div class="row"><span class="muted">Session:</span><strong id="sid">-</strong><span id="state" class="chip run">idle</span></div>
      <p class="muted" id="phase">Phase: -</p>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <p class="muted">Gate: <span id="gate">-</span> | Lock: <span id="lock">-</span></p>
      <p class="muted">Aktuell: <span id="current">-</span></p>
      <div id="error" class="errors" style="display:none;"></div>
      <div class="row" style="margin-top:0.6rem;"><button id="cancel" type="button">Session stoppen</button></div>
    </section>

    <script>
      const sid = document.getElementById("sid");
      const stateEl = document.getElementById("state");
      const phase = document.getElementById("phase");
      const bar = document.getElementById("bar");
      const gate = document.getElementById("gate");
      const lock = document.getElementById("lock");
      const current = document.getElementById("current");
      const error = document.getElementById("error");
      const cancel = document.getElementById("cancel");

      function render(status) {
        sid.textContent = status.sessionId || "-";
        stateEl.textContent = status.status || "idle";
        stateEl.className = "chip " + (status.status === "completed" ? "ok" : status.status === "failed" ? "err" : "run");
        phase.textContent = `Phase: ${status.phase || "-"}`;
        bar.style.width = `${Math.max(0, Math.min(100, Number(status.progress?.percent || 0)))}%`;
        gate.textContent = status.gateStatus?.state || "-";
        lock.textContent = status.lock?.state || "-";
        current.textContent = [status.current?.patchId, status.current?.file].filter(Boolean).join(" | ") || "-";
        if (status.error) {
          error.style.display = "block";
          error.textContent = `${status.error.code} | ${status.error.phase} | ${status.error.message}`;
        } else {
          error.style.display = "none";
          error.textContent = "";
        }
      }

      async function api(path, method = "GET", body = null) {
        const res = await fetch(path, {
          method,
          headers: body ? { "content-type": "application/json" } : undefined,
          body: body ? JSON.stringify(body) : undefined
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      cancel.addEventListener("click", async () => {
        await api("/api/cancel", "POST", {});
      });

      const source = new EventSource("/api/events");
      source.addEventListener("status", (evt) => {
        render(JSON.parse(evt.data || "{}"));
      });

      api("/api/status").then(render).catch(() => {});
    </script>
  </body>
</html>
